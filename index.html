<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MetaFlow PMES</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Menu de Navegaçăo Superior -->
  <div class="semana-tracker">
    <div class="dia-dot home-btn" id="dot-home" onclick="irParaHome()"></div>
    <div class="dia-dot" id="dot-0" onclick="irParaDia(0)">S</div>
    <div class="dia-dot" id="dot-1" onclick="irParaDia(1)">T</div>
    <div class="dia-dot" id="dot-2" onclick="irParaDia(2)">Q</div>
    <div class="dia-dot" id="dot-3" onclick="irParaDia(3)">Q</div>
    <div class="dia-dot" id="dot-4" onclick="irParaDia(4)">S</div>
    <div class="dia-dot" id="dot-5" onclick="irParaDia(5)">S</div>
  </div>

  <!-- Cabeçalho de Navegaçăo -->
  <div class="topo" id="topoNavegacao">
    <button onclick="voltarDia()"></button>
    <h1 id="tituloDia">Segunda</h1>
    <button onclick="proximoDia()"></button>
  </div>

  <!-- Conteúdo Dinâmico -->
  <div id="conteudoDia"></div>

  <script src="script.js"></script>
</body>
</html>
